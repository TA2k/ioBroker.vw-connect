            function firstValidationStep(visibleElements, elementName) {
                var elementToValidate = $(".wpwl-group-" + elementName);
                var result = elementToValidate.contents().find(".wpwl-has-error").val() === undefined;
                if (!result) {
                    android.onValidElement(elementName, result.toString());
                }
                else {
                    var isInputEmpty = false;
                    var isInputBadSymbols = false;
                    var elements = visibleElements.split(',');
                    for (i = 0; i < elements.length; i++) {
                        var curElement = elements[i];
                        isInputEmpty = isElementInputEmpty(curElement);

                    android.continueValidationElement(elementName, (isInputEmpty || isInputBadSymbols).toString());

                                $("form.wpwl-form-card").find(".wpwl-group-submit").before(createRegistrationHtml);
                                $("form.wpwl-form-directDebit").find(".wpwl-group-submit").before(createRegistrationHtml);
                            {{/showStorePaymentMethod}}

                            {{#showCVVHint}}
                                $(".wpwl-wrapper-cvv").append("<div class=\"cvv-hint-icon\">&nbsp;</div>");
                            {{/showCVVHint}}
                        },
                        onError: function(error) {
                            console.log("js onError");
                            android.onError(error.name, error.message);
                        },
                        onChangeBrand: function(brand) {
                            var brandLogo = $(".wpwl-brand-card");

                            if(useBrandDetection){
                                if (typeof latestBrand === "undefined") {
                                    // Hide logo on initial load
                                    brandLogo.hide();
                                    latestBrand = null;
                                } else if (brand !== latestBrand) {
                                    brandLogo.show();
                                    latestBrand = brand;
                                }
                            }
                        },
                        onBeforeSubmitCard: function(e) {
                            console.log("js onBeforeSubmitCard");
                            var cardHolderElement = $(".wpwl-form-card .wpwl-control-cardHolder");
                            var cardHolder = cardHolderElement.val();
                            if (!cardHolder || !cardHolder.match(/^[^%\{\[\]\}\$€§\?@\&\#\^\<\>]*$/) || cardHolder.length < 3) {
                                var message = getString("validationErrorCardHolder");
                                addValidationError(cardHolderElement, message);
                                return false;
                            }
                            return onBeforeSubmit(e);
                        },
                        onBeforeSubmitDirectDebit: function(e) {
                            console.log("js onBeforeSubmitDirectDebit");
                            var ibanElement = $(".wpwl-form-directDebit .wpwl-control-accountIban");
                            var iban = ibanElement.val();
                            var isDataValid = true;

                            if(iban){
                                var ibanCountry = iban.substring(0, 2).toUpperCase();
                                if(!supportedIbanCountries.includes(ibanCountry)){
                                    var message = getString("validationErrorInvalidIbanCountry");
                                    addValidationError(ibanElement, message);
                                    isDataValid = false;
                                }
                            }

                            var holderElement = $(".wpwl-form-directDebit .wpwl-control-accountHolder");
                            var holder = holderElement.val();
                            if (!holder || !holder.match(/^[^%\{\[\]\}\$€§\?@\&\#\^\<\>]*$/)) {
                                var message = getString("validationErrorAccountHolder");
                                addValidationError(holderElement, message);
                                isDataValid = false;
                            }
                            if (!isDataValid) return false;
                            return onBeforeSubmit(e);
                        },
                        onBeforeSubmitOnlineTransfer: function(e) {
                            return onBeforeSubmit(e);
                        },
                        onBeforeSubmitVirtualAccount: function(e) {
                            return onBeforeSubmit(e);
                        },
                        onBlurCardNumber: function(isValid){
                          cardNumberIsValid = isValid;
                        },
                        onSaveTransactionData: function(e){
                            console.log("js onSaveTransactionData");
                        },
                        onFocusIframeCommunication: function(e){
                            console.log("js onFocusIframeCommunication");
                        },
                        onBlurIframeCommunication: function(e){
                            console.log("js onBlurIframeCommunication");
                        },
                        onBlurSecurityCode: function(isValid){
                          cvvIsValid = isValid;
                        }
                    });
                }(wpwlOptions));

                ns.submit = function(){
                    console.log("js ns.submit");
                    $(".wpwl-button").click();
                };
            }(kc));


    </script>

        <script
                src="{{{widgetUrl}}}v1/paymentWidgets.js?checkoutId={{{token}}}"
                type="text/javascript"></script>

                    type="hidden"
                    id="strings_validationErrorInvalidIbanCountry"
                    value="{{strings.validationErrorInvalidIbanCountry}}" />
            <input
                    type="hidden"

            <input
                    type="hidden"

                id="external-payment-form-create-registration-template">

            </div>

    </body>
